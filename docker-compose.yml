version: '3.9'

services:
  minio:
    image: minio/minio:latest
    container_name: receiptify-storage
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - backend-network
  redis:
    image: redis:7-alpine
    container_name: receiptify-cache
    restart: always
    ports:
      - "6379:6379"
    networks:
      - backend-network
networks:
  backend-network:
    driver: bridge
volumes:
  minio_data:

